<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>ユーザー登録</h1>
    <form
      action="exam04-result.html"
      th:action="@{/exam04/result}"
      th:object="${userForm}"
      method="post"
    >
      <div th:errors="*{name}" style="color: red">エラー！</div>
      <div>
        <label for="name">名前：</label>
        <input type="text" th:field="*{name}" />
      </div>
      <div th:errors="*{age}" style="color: red">エラー！</div>
      <div>
        <label for="age">年齢：</label>
        <input type="text" th:field="*{age}" />
      </div>
      <div th:errors="*{comment}" style="color: red">エラー！</div>
      <div>
        <label for="comment">コメント：</label>
        <input type="text" th:field="*{comment}" />
      </div>
      <button type="submit">登録</button>
    </form>
  </body>
</html>
